<!doctype html>
<html lang="is">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orð — Game Screens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1c; font-family: 'Familjen Grotesk', system-ui, sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="tafl.jsx"></script>
  <script type="text/babel" src="saga.jsx"></script>
  <script type="text/babel" src="leikur.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    // Wrap a screen in an iOS device frame, with the right status bar tint per direction.
    function Phone({ children, dark = false, statusTime = '9:41', bg }) {
      return (
        <IOSDevice width={402} height={874} dark={dark}>
          <div style={{ width: '100%', height: '100%', background: bg, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>
            <IOSStatusBar dark={dark} />
            <div style={{ flex: 1, overflowY: 'auto', minHeight: 0 }}>
              {children}
            </div>
          </div>
        </IOSDevice>
      );
    }

    function Intro() {
      return (
        <div style={{
          padding: '40px 60px 32px', color: '#e6e3dc',
          fontFamily: '"Familjen Grotesk", system-ui',
          maxWidth: 980,
        }}>
          <div style={{ fontFamily: '"DM Mono", monospace', fontSize: 11, letterSpacing: 2, textTransform: 'uppercase', color: '#a09a8b' }}>Orð · v0.1 · Apr 26 2026</div>
          <h1 style={{ fontSize: 48, fontWeight: 700, margin: '8px 0 12px', letterSpacing: -1.5 }}>
            Game screens, three directions.
          </h1>
          <p style={{ fontSize: 16, lineHeight: 1.55, margin: 0, color: '#bdb6a3', maxWidth: 720 }}>
            Four screens — Uppsetning, Leikur, Mat, Lokum — explored as three board-game-flavored
            visual directions. All Icelandic UI, mobile-first, single-action-per-screen, 44pt+ touch
            targets. Tap any artboard to focus it; drag to reorder. Each direction commits to a
            distinct typographic + color system.
          </p>
          <div style={{ display: 'flex', gap: 24, marginTop: 24, fontFamily: '"DM Mono", monospace', fontSize: 11, color: '#a09a8b', letterSpacing: 1.4, textTransform: 'uppercase' }}>
            <div><span style={{ display: 'inline-block', width: 10, height: 10, background: '#c9532b', borderRadius: 2, marginRight: 8, verticalAlign: -1 }} />Tafl · warm cardboard</div>
            <div><span style={{ display: 'inline-block', width: 10, height: 10, background: '#114a4a', borderRadius: 2, marginRight: 8, verticalAlign: -1 }} />Saga · nordic vintage</div>
            <div><span style={{ display: 'inline-block', width: 10, height: 10, background: '#ffc832', borderRadius: 2, marginRight: 8, verticalAlign: -1 }} />Leikur · bright pop</div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas storageKey="ord-canvas-v1" background="#1a1a1c">
          <DCSection id="intro" title="Orð · Icelandic word game" subtitle="Mobile-first · Icelandic UI · 3 directions × 4 screens">
            <DCArtboard id="readme" label="Brief & directions" width={980} height={360}>
              <Intro />
            </DCArtboard>
          </DCSection>

          <DCSection id="tafl" title="01 — Tafl" subtitle="Warm cardboard. Cream + terracotta + mustard + forest. Familjen Grotesk + DM Mono.">
            <DCArtboard id="tafl-setup"   label="Uppsetning · Setup"   width={402} height={874}>
              <Phone bg={TaflTokens.bg}><TaflSetup /></Phone>
            </DCArtboard>
            <DCArtboard id="tafl-play"    label="Leikur · Play"        width={402} height={874}>
              <Phone bg={TaflTokens.bg}><TaflPlay /></Phone>
            </DCArtboard>
            <DCArtboard id="tafl-review"  label="Mat · Review"         width={402} height={874}>
              <Phone bg={TaflTokens.bg}><TaflReview /></Phone>
            </DCArtboard>
            <DCArtboard id="tafl-summary" label="Lokum · Summary"      width={402} height={874}>
              <Phone bg={TaflTokens.bg}><TaflSummary /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="saga" title="02 — Saga" subtitle="Nordic vintage. Parchment + deep teal + ochre + rust. DM Serif Display + Familjen Grotesk + JetBrains Mono.">
            <DCArtboard id="saga-setup"   label="Uppsetning · Setup"   width={402} height={874}>
              <Phone bg={SagaTokens.bg}><SagaSetup /></Phone>
            </DCArtboard>
            <DCArtboard id="saga-play"    label="Leikur · Play"        width={402} height={874}>
              <Phone bg={SagaTokens.bg}><SagaPlay /></Phone>
            </DCArtboard>
            <DCArtboard id="saga-review"  label="Mat · Review"         width={402} height={874}>
              <Phone bg={SagaTokens.bg}><SagaReview /></Phone>
            </DCArtboard>
            <DCArtboard id="saga-summary" label="Lokum · Summary"      width={402} height={874}>
              <Phone bg={SagaTokens.bg}><SagaSummary /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="leikur" title="03 — Leikur" subtitle="Bright pop. Saturated meeple energy. Chunky outlines, dice pips, stickers, playful tilts.">
            <DCArtboard id="leik-setup"   label="Uppsetning · Setup"   width={402} height={874}>
              <Phone bg={LeikTokens.bg}><LeikSetup /></Phone>
            </DCArtboard>
            <DCArtboard id="leik-play"    label="Leikur · Play"        width={402} height={874}>
              <Phone bg={LeikTokens.bg}><LeikPlay /></Phone>
            </DCArtboard>
            <DCArtboard id="leik-review"  label="Mat · Review"         width={402} height={874}>
              <Phone bg={LeikTokens.bg}><LeikReview /></Phone>
            </DCArtboard>
            <DCArtboard id="leik-summary" label="Lokum · Summary"      width={402} height={874}>
              <Phone bg={LeikTokens.bg}><LeikSummary /></Phone>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
